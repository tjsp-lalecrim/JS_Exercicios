<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Controle de Exercícios</title>

    <link rel="stylesheet" href="style.css">

    <script src="script.js" defer></script>
</head>

<body>

    <div class="container">

        <h1>🏋️ Exercícios</h1>

        <button
            id="toggleFormBtn"
            class="toggleFormBtn">

            ▲ Cadastro

        </button>

        <div
            id="formArea"
            class="inputArea">

            <input
                id="exerciseName"
                type="text"
                placeholder="Ex: Prancha">

            <input
                id="exerciseTime"
                type="number"
                placeholder="Segundos">

            <button id="addBtn">
                +
            </button>

        </div>

        <div
            id="list"
            class="list"></div>

        <button
            id="resetBtn"
            class="resetBtn">

            Resetar treino do dia

        </button>

    </div>

</body>

</html>
